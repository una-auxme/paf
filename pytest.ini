[pytest]
testpaths = code
python_files = test_*.py *_test.py
addopts = -ra --strict-config --strict-markers
xfail_strict = true
norecursedirs = .git .github .devcontainer build volumes code-ros1
markers =
    unit: Fast, isolated tests with no ROS graph or external services.
    integration: Cross-module tests with multiple components and realistic inputs.
    sim: Simulation-backed tests that require CARLA/ROS simulation runtime.
    ros: Tests that require ROS middleware/runtime behavior.
    slow: Long-running tests not suitable for fast feedback loops.
