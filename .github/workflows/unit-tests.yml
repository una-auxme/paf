name: Host smoke tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  host-smoke-tests:
    name: Run host smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r code/requirements_infrastructure.txt
          python -m pip install numpy
      - name: Run host smoke tests (plugin autoload disabled)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest code/test -m unit
